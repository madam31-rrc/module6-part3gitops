apiVersion: apps/v1
kind: Deployment
metadata:
  name: transactions
spec:
  replicas: 2
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: transactions
  template:
    metadata:
      labels:
        app: transactions
    spec:
      containers:
        - name: transactions
          image: ghcr.io/madam31-rrc/module6-part3-madam31-rrc/transactions:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 4000
              name: http
          env:
            - name: PORT
              value: "4000"
          readinessProbe:
            tcpSocket:
              port: 4000
            initialDelaySeconds: 8
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 4000
            initialDelaySeconds: 25
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
